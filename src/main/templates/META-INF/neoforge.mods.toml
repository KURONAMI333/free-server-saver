modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
logoFile="icon.png"
description='''
${mod_description}
'''

# Mixin configuration: ChunkMapAccessor exposes ChunkMap.getChunks()
# so ChunkPruningModule can do its flood-fill walk of loaded chunks.
[[mixins]]
config="freeserversaver.mixins.json"

# Hard dependency on NeoForge runtime
# NOTE: versionRange uses neo_version (21.1.227), NOT loader_version_range.
# loader_version_range is for the javafml loader (top of file); the NeoForge
# dependency wants the NeoForge version range. Composing "[${loader_version_range},)"
# produces "[[1,),)" which fails to parse and breaks the mod at load time.
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

# Hard dependency on Minecraft 1.21.1 — random tick logic changed in 1.21.2+
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
