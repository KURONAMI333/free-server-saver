# Heap Guardian — Low-RAM adaptive throttle for NeoForge 1.21.1
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Parchment mappings
parchment_minecraft_version=1.21.1
parchment_mappings_version=2024.11.17

# Minecraft / NeoForge
# Pinned to 1.21.1 — random tick logic changed in 1.21.2+, see HEAP_GUARDIAN_NOTES.md
minecraft_version=1.21.1
minecraft_version_range=[1.21.1]
neo_version=21.1.227
loader_version_range=[1,)

# Mod identity
mod_id=aternosguardian
mod_name=Aternos Heap Guardian
mod_license=MIT
mod_version=0.1.0
mod_group_id=com.kuronami.aternosguardian
mod_authors=KURONAMI
mod_description=Heap-aware lag reducer purpose-built for Aternos free servers. Polls JVM heap and progressively scales back mob AI ticks, spawns, and view distance before GC pauses become the rubber-banding and "mob teleporting" lag Aternos players know too well. Tuned for the 2.5GB RAM ceiling. Also works on any home server or old PC.
